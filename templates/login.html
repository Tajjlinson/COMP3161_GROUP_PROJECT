{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold">Course Management Portal</h1>
                        <p class="text-muted mb-0">Sign in with your existing API credentials.</p>
                    </div>
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">User ID</label>
                            <input type="text" class="form-control" name="user_code" placeholder="admin001" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <hr class="my-4">
                    <small class="text-muted d-block">
                        Demo seeded users:
                        <code>admin/password123</code>,
                        <code>lect01/password123</code>,
                        <code>stud0001/password123</code>
                    </small>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
