name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: COMP3161_GROUP_PROJECT-main

      - name: Verify Flask app imports
        run: python -c "import complete_course_management_api as app; print(app.app.url_map)"
        working-directory: COMP3161_GROUP_PROJECT-main

      - name: Build Docker image
        run: docker build -t comp3161-course-management .
        working-directory: COMP3161_GROUP_PROJECT-main
